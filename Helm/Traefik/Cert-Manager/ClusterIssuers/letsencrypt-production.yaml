---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    # Set to the mailbox that should receive ACME notifications.
    email: swevo24@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
    - selector:
        dnsZones:
        - tehmatt.com
      dns01:
        cloudflare:
          # Uses global Cloudflare API key mode to avoid the token cleanup issue seen in this cluster.
          email: swevo24@gmail.com
          apiKeySecretRef:
            name: cloudflare-token-secret
            key: cloudflare-api-key
