---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-token-secret
  namespace: cert-manager
type: Opaque
stringData:
  # Cloudflare account email used with Global API Key mode.
  cloudflare-email: your-cloudflare-email@example.com
  # Cloudflare Global API Key.
  cloudflare-api-key: REPLACE_WITH_GLOBAL_API_KEY
