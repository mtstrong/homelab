---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: handbrake
  name: handbrake
  namespace: handbrake
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: handbrake
  template:
    metadata:
      labels:
        app: handbrake
    spec:
      nodeSelector:
        worker: "true"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: handbrake-server
        image: ghcr.io/thenickoftime/handbrake-web-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9999
          name: http
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: 9999
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 9999
          initialDelaySeconds: 45
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - mountPath: /data
          name: config
        - mountPath: /video
          name: handbrake-data
      - name: handbrake-worker
        image: ghcr.io/thenickoftime/handbrake-web-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: WORKER_ID
          value: handbrake-worker-1
        - name: SERVER_URL
          value: localhost
        - name: SERVER_PORT
          value: "9999"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - mountPath: /video
          name: handbrake-data
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: handbrake-config
      - name: handbrake-data
        nfs:
          server: 192.168.1.38
          path: /mnt/OneTbs/nzb-dls
