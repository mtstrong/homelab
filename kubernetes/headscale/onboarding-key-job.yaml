apiVersion: batch/v1
kind: Job
metadata:
  name: headscale-key-nas
  namespace: headscale
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-key
          image: headscale/headscale:0.26.1
          command: ["headscale"]
          args: ["--config", "/etc/headscale/config.yaml", "preauthkeys", "create", "--user", "nas", "--reusable", "--expiration", "0"]
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: data
              mountPath: /var/lib/headscale
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
