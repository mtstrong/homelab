apiVersion: batch/v1
kind: Job
metadata:
  name: headscale-user-nas
  namespace: headscale
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-user
          image: headscale/headscale:0.28.0
          command: ["headscale"]
          args: ["--config", "/etc/headscale/config.yaml", "users", "create", "nas"]
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: data
              mountPath: /var/lib/headscale
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
