apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale
data:
  config.yaml: |
    server_url: https://headscale.tehmatt.com
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: false

    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48

    derp:
      server:
        enabled: false
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      auto_update_enabled: true
      update_frequency: 24h

    disable_check_updates: false
    ephemeral_node_inactivity_timeout: 30m

    db_type: sqlite3
    db_path: /var/lib/headscale/db.sqlite

    policy:
      mode: file
      path: /etc/headscale/acl.hujson

    log:
      format: text
      level: info

    dns:
      magic_dns: true
      base_domain: headscale.tehmatt.com
      nameservers:
        global:
          - 1.1.1.1
          - 1.0.0.1
  acl.hujson: |
    {
      // Replace with your real Headscale users.
      "groups": {
        "group:nas-admins": [
          "you@headscale",
        ],
      },

      // Tag your Synology node with: tag:synology
      "tagOwners": {
        "tag:synology": ["group:nas-admins"],
      },

      "acls": [
        {
          "action": "accept",
          "src": ["group:nas-admins"],
          "dst": [
            "tag:synology:22",    // SSH
            "tag:synology:445",   // SMB
            "tag:synology:5000",  // DSM HTTP
            "tag:synology:5001",  // DSM HTTPS
            "tag:synology:2049",  // NFS
          ],
        },
      ],
    }
