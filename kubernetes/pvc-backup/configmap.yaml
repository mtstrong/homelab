---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pvc-backup-script
  namespace: pvc-backup
data:
  backup.sh: |
    #!/bin/sh
    set -e

    BACKUP_BASE="/backups"
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    BACKUP_DIR="${BACKUP_BASE}/${TIMESTAMP}"
    RETENTION_DAYS=7
    LOG="${BACKUP_BASE}/backup-${TIMESTAMP}.log"

    log() { echo "[$(date '+%H:%M:%S')] $*" | tee -a "$LOG"; }

    log "=== PVC Nightly Backup ==="
    log "Backup directory: ${BACKUP_DIR}"
    mkdir -p "${BACKUP_DIR}"

    SUCCESS=0
    FAILED=0
    SKIPPED=0

    # PVC list: namespace pvc_name
    cat <<'PVCLIST' > /tmp/pvc-list.txt
    audiobookshelf audiobookshelf-config
    audiobookshelf audiobookshelf-metadata
    audiobookshelf audiobookshelf-uploads
    grafana grafana-pvc
    homeassistant homeassistant-config
    homebridge homebridge-config
    kavita kavita
    loki-stack loki-data-pvc
    notifiarr notifiarr-config
    prometheus prometheus-pvc
    prowlarr prowlarr-config
    readarr readarr
    tautulli tautulli
    PVCLIST

    # Trim leading whitespace
    sed -i 's/^[[:space:]]*//' /tmp/pvc-list.txt

    TOTAL=$(wc -l < /tmp/pvc-list.txt)
    CURRENT=0

    while read -r namespace pvc_name; do
      [ -z "$namespace" ] && continue
      CURRENT=$((CURRENT + 1))
      log ""
      log "[${CURRENT}/${TOTAL}] Backing up ${namespace}/${pvc_name}..."

      # Find pod using this PVC
      POD=$(kubectl get pods -n "$namespace" -o json | \
        jq -r --arg pvc "$pvc_name" \
        '.items[] | select(.status.phase=="Running") | select(.spec.volumes[]? | .persistentVolumeClaim?.claimName == $pvc) | .metadata.name' | head -1)

      if [ -z "$POD" ]; then
        log "  SKIP: No running pod found for PVC ${pvc_name}"
        SKIPPED=$((SKIPPED + 1))
        continue
      fi
      log "  Pod: ${POD}"

      # Get volume name and mount path
      VOL_NAME=$(kubectl get pod "$POD" -n "$namespace" -o json | \
        jq -r --arg pvc "$pvc_name" \
        '.spec.volumes[] | select(.persistentVolumeClaim?.claimName == $pvc) | .name')

      MOUNT_PATH=$(kubectl get pod "$POD" -n "$namespace" -o json | \
        jq -r --arg vol "$VOL_NAME" \
        '.spec.containers[0].volumeMounts[] | select(.name == $vol) | .mountPath')

      if [ -z "$MOUNT_PATH" ]; then
        log "  SKIP: Could not determine mount path"
        SKIPPED=$((SKIPPED + 1))
        continue
      fi
      log "  Mount: ${MOUNT_PATH}"

      # Get first container name
      CONTAINER=$(kubectl get pod "$POD" -n "$namespace" -o jsonpath='{.spec.containers[0].name}')

      # Test access
      if ! kubectl exec "$POD" -n "$namespace" -c "$CONTAINER" -- ls "$MOUNT_PATH" >/dev/null 2>&1; then
        log "  FAIL: Cannot access ${MOUNT_PATH} (I/O error?)"
        FAILED=$((FAILED + 1))
        continue
      fi

      # Get data size
      DATA_SIZE=$(kubectl exec "$POD" -n "$namespace" -c "$CONTAINER" -- du -sh "$MOUNT_PATH" 2>/dev/null | awk '{print $1}' || echo "unknown")
      log "  Size: ${DATA_SIZE}"

      # Create backup
      mkdir -p "${BACKUP_DIR}/${namespace}"
      if kubectl exec "$POD" -n "$namespace" -c "$CONTAINER" -- tar czf - -C "$MOUNT_PATH" . > "${BACKUP_DIR}/${namespace}/${pvc_name}.tar.gz" 2>/dev/null; then
        BACKUP_SIZE=$(ls -lh "${BACKUP_DIR}/${namespace}/${pvc_name}.tar.gz" | awk '{print $5}')
        log "  OK: ${BACKUP_SIZE}"
        SUCCESS=$((SUCCESS + 1))
      else
        log "  FAIL: tar exited with error"
        rm -f "${BACKUP_DIR}/${namespace}/${pvc_name}.tar.gz"
        FAILED=$((FAILED + 1))
      fi
    done < /tmp/pvc-list.txt

    # Write manifest
    cat > "${BACKUP_DIR}/manifest.txt" <<EOF
    PVC Backup - $(date)
    Success: ${SUCCESS}  Failed: ${FAILED}  Skipped: ${SKIPPED}  Total: ${TOTAL}
    EOF
    du -sh "${BACKUP_DIR}"/* 2>/dev/null >> "${BACKUP_DIR}/manifest.txt"

    log ""
    log "=== Summary ==="
    log "Success: ${SUCCESS}  Failed: ${FAILED}  Skipped: ${SKIPPED}  Total: ${TOTAL}"

    # Retention: remove backups older than N days
    log ""
    log "=== Retention: removing backups older than ${RETENTION_DAYS} days ==="
    find "${BACKUP_BASE}" -maxdepth 1 -mindepth 1 -type d -mtime +${RETENTION_DAYS} | while read -r old_dir; do
      log "  Removing: $(basename "$old_dir")"
      rm -rf "$old_dir"
    done

    # Also clean up old log files
    find "${BACKUP_BASE}" -maxdepth 1 -name "backup-*.log" -mtime +${RETENTION_DAYS} -delete

    log "=== Done ==="

    # Exit with failure if any backups failed
    if [ "$FAILED" -gt 0 ]; then
      exit 1
    fi
