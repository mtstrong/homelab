---
apiVersion: v1
kind: Secret
metadata:
  name: tinyauth-secrets
  namespace: tinyauth
  annotations:
    avp.kubernetes.io/path: "kv/data/apps/tinyauth"
    avp.kubernetes.io/kv-version: "2"
type: Opaque
stringData:
  # Fill these at kv/data/apps/tinyauth in Vault.
  SECRET: <SECRET>
  GOOGLE_CLIENT_ID: <GOOGLE_CLIENT_ID>
  GOOGLE_CLIENT_SECRET: <GOOGLE_CLIENT_SECRET>
  OAUTH_WHITELIST: <OAUTH_WHITELIST>
