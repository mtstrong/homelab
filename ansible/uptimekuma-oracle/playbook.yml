---
- hosts: uptimekuma_oracle
  become: true
  collections:
    - community.docker
  vars:
    uptimekuma_image: "louislam/uptime-kuma:1"
    uptimekuma_container_name: "uptimekuma"
    uptimekuma_data_dir: "/opt/uptime-kuma/data"
    uptimekuma_port: 3001
  tasks:
    - name: Install base packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install base packages (RedHat/Oracle Linux)
      ansible.builtin.yum:
        name:
          - ca-certificates
          - curl
          - python3-pip
          - docker
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Install Docker SDK for Python
      ansible.builtin.pip:
        name: docker
        executable: pip3

    - name: Create Uptime Kuma data directory
      ansible.builtin.file:
        path: "{{ uptimekuma_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Run Uptime Kuma container
      community.docker.docker_container:
        name: "{{ uptimekuma_container_name }}"
        image: "{{ uptimekuma_image }}"
        restart_policy: unless-stopped
        published_ports:
          - "{{ uptimekuma_port }}:3001"
        volumes:
          - "{{ uptimekuma_data_dir }}:/app/data"
